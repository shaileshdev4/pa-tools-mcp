name: po-community-mcp

services:
  typescript:
    restart: always
    build:
      dockerfile: ./typescript/Dockerfile
    ports:
      - "55000:5000"
  dotnet:
    restart: always
    build:
      dockerfile: ./dotnet/Dockerfile
    ports:
      - "55001:8080"
  python:
    restart: always
    build:
      dockerfile: ./python/Dockerfile
    ports:
      - "55002:5001"
